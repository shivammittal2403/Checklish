<DOCUMENT filename="ISO27001_Smart_Audit_Checklist.html">
<!DOCTYPE html>
<html>
<head>
<title>ISO 27001 Smart Audit Checklist</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:40px;}
h1{text-align:center;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{border:1px solid #ccc;padding:8px;}
th{background:#34495e;color:white;}
select{width:110px;}
textarea{width:100%;height:50px;}
.remediation{color:#c0392b;font-size:13px;}
button{padding:10px;margin:10px;}
.domain{font-weight:bold;color:#2980b9;}
</style>
</head>
<body>
<h1>ISO 27001:2022 – Annex A Controls Compliance Checklist (93 Controls)</h1>
<button onclick="exportCSV()">Export to Excel</button>
<table id="table">
<tr>
<th>ID</th>
<th>Domain</th>
<th>Control</th>
<th>Status</th>
<th>Remediation Guidance</th>
<th>Notes</th>
</tr>
</table>

<script>
const controls = [
{domain:"Organizational", name:"5.1 Policies for information security", guide:"Define and approve information security policies at management level and communicate them to all relevant parties."},
{domain:"Organizational", name:"5.2 Information security roles and responsibilities", guide:"Allocate specific security roles and responsibilities and document them clearly across the organisation."},
{domain:"Organizational", name:"5.3 Segregation of duties", guide:"Separate conflicting duties to prevent fraud or misuse of authority."},
{domain:"Organizational", name:"5.4 Management responsibilities", guide:"Ensure top management provides resources and active support for information security."},
{domain:"Organizational", name:"5.5 Contact with authorities", guide:"Establish formal communication channels with relevant regulatory and law-enforcement authorities."},
{domain:"Organizational", name:"5.6 Contact with special interest groups", guide:"Participate in relevant security forums and professional communities for threat intelligence."},
{domain:"Organizational", name:"5.7 Threat intelligence", guide:"Establish processes to collect and analyse threat intelligence from internal and external sources."},
{domain:"Organizational", name:"5.8 Information security in project management", guide:"Integrate information security requirements into every project management methodology."},
{domain:"Organizational", name:"5.9 Inventory of information and other associated assets", guide:"Create and maintain a complete inventory of all information assets and associated assets."},
{domain:"Organizational", name:"5.10 Acceptable use of information and other associated assets", guide:"Define and communicate clear rules for acceptable use of all assets."},
{domain:"Organizational", name:"5.11 Return of assets", guide:"Implement procedures to ensure all assets are returned upon termination or change of employment."},
{domain:"Organizational", name:"5.12 Classification of information", guide:"Establish and maintain an information classification scheme based on value and sensitivity."},
{domain:"Organizational", name:"5.13 Labelling of information", guide:"Apply appropriate labels to information according to its classification."},
{domain:"Organizational", name:"5.14 Information transfer", guide:"Define secure procedures for transferring information inside and outside the organisation."},
{domain:"Organizational", name:"5.15 Access control", guide:"Implement a formal access control policy based on business requirements and least privilege."},
{domain:"Organizational", name:"5.16 Identity management", guide:"Manage the full lifecycle of user identities (creation, modification, deletion)."},
{domain:"Organizational", name:"5.17 Authentication information", guide:"Protect authentication information with strict confidentiality and complexity controls."},
{domain:"Organizational", name:"5.18 Access rights", guide:"Review and revoke access rights regularly, especially after role changes or termination."},
{domain:"Organizational", name:"5.19 Information security in supplier relationships", guide:"Assess and manage information security risks in all supplier relationships."},
{domain:"Organizational", name:"5.20 Addressing information security within supplier agreements", guide:"Include explicit information security clauses in all supplier contracts."},
{domain:"Organizational", name:"5.21 Managing information security in the ICT supply chain", guide:"Secure the entire ICT supply chain with risk-based controls."},
{domain:"Organizational", name:"5.22 Monitoring, review and change management of supplier services", guide:"Continuously monitor and review supplier service performance against security agreements."},
{domain:"Organizational", name:"5.23 Information security for use of cloud services", guide:"Establish specific security requirements and responsibilities for cloud service providers."},
{domain:"Organizational", name:"5.24 Information security incident management planning and preparation", guide:"Develop and test a formal incident response plan."},
{domain:"Organizational", name:"5.25 Assessment and decision on information security events", guide:"Define criteria to classify security events as incidents."},
{domain:"Organizational", name:"5.26 Response to information security incidents", guide:"Execute structured containment, eradication and recovery actions for incidents."},
{domain:"Organizational", name:"5.27 Learning from information security incidents", guide:"Conduct root-cause analysis and update controls after every incident."},
{domain:"Organizational", name:"5.28 Collection of evidence", guide:"Preserve evidence in a forensically sound and legally admissible manner."},
{domain:"Organizational", name:"5.29 Information security during disruption", guide:"Maintain information security controls during business continuity and disaster recovery."},
{domain:"Organizational", name:"5.30 ICT readiness for business continuity", guide:"Ensure ICT systems support defined recovery time and recovery point objectives."},
{domain:"Organizational", name:"5.31 Identification of legal, statutory, regulatory and contractual requirements", guide:"Identify and document all applicable legal and contractual obligations."},
{domain:"Organizational", name:"5.32 Intellectual property rights", guide:"Protect intellectual property rights and ensure compliance with licensing agreements."},
{domain:"Organizational", name:"5.33 Protection of records", guide:"Secure records against loss, destruction or falsification throughout their lifecycle."},
{domain:"Organizational", name:"5.34 Privacy and protection of PII", guide:"Implement measures to protect personally identifiable information and comply with privacy laws."},
{domain:"Organizational", name:"5.35 Independent review of information security", guide:"Conduct regular independent audits of the ISMS."},
{domain:"Organizational", name:"5.36 Compliance with policies and standards for information security", guide:"Regularly verify that policies and standards are being followed."},
{domain:"Organizational", name:"5.37 Documented operating procedures", guide:"Maintain documented procedures for all information processing activities."},

{domain:"People", name:"6.1 Screening", guide:"Perform background verification checks on all candidates before employment."},
{domain:"People", name:"6.2 Terms and conditions of employment", guide:"Include information security responsibilities in all employment contracts."},
{domain:"People", name:"6.3 Information security awareness, education and training", guide:"Deliver regular security awareness training to all personnel."},
{domain:"People", name:"6.4 Disciplinary process", guide:"Define disciplinary actions for information security breaches."},
{domain:"People", name:"6.5 Responsibilities after termination or change of employment", guide:"Revoke access and retrieve assets immediately upon termination."},
{domain:"People", name:"6.6 Confidentiality or non-disclosure agreements", guide:"Require signed NDAs from employees, contractors and third parties."},
{domain:"People", name:"6.7 Remote working", guide:"Establish security controls for all remote and home working scenarios."},
{domain:"People", name:"6.8 Information security event reporting", guide:"Train personnel to report security events immediately through defined channels."},

{domain:"Physical", name:"7.1 Physical security perimeters", guide:"Define and protect physical security perimeters with barriers and access controls."},
{domain:"Physical", name:"7.2 Physical entry", guide:"Implement secure entry controls (badges, biometrics, visitor logs)."},
{domain:"Physical", name:"7.3 Securing offices, rooms and facilities", guide:"Secure all offices and facilities against unauthorised access."},
{domain:"Physical", name:"7.4 Physical security monitoring", guide:"Install and maintain CCTV and alarm monitoring systems."},
{domain:"Physical", name:"7.5 Protecting against physical and environmental threats", guide:"Protect equipment from fire, flood, power failure and other environmental threats."},
{domain:"Physical", name:"7.6 Working in secure areas", guide:"Enforce strict rules for working in high-security areas."},
{domain:"Physical", name:"7.7 Clear desk and clear screen", guide:"Enforce clear-desk and clear-screen policies at all times."},
{domain:"Physical", name:"7.8 Equipment siting and protection", guide:"Site and protect equipment against physical damage or theft."},
{domain:"Physical", name:"7.9 Security of assets off-premises", guide:"Protect assets taken off-site with encryption and tracking."},
{domain:"Physical", name:"7.10 Storage media", guide:"Control and secure all removable storage media."},
{domain:"Physical", name:"7.11 Supporting utilities", guide:"Ensure supporting utilities (power, cooling) are reliable and protected."},
{domain:"Physical", name:"7.12 Cabling security", guide:"Protect cabling from unauthorised interception or damage."},
{domain:"Physical", name:"7.13 Equipment maintenance", guide:"Maintain equipment according to manufacturer recommendations."},
{domain:"Physical", name:"7.14 Secure disposal or re-use of equipment", guide:"Securely wipe or destroy equipment before disposal or re-use."},

{domain:"Technological", name:"8.1 User endpoint devices", guide:"Secure all user endpoint devices with antivirus, encryption and patching."},
{domain:"Technological", name:"8.2 Use of privileged access rights", guide:"Restrict and monitor privileged access rights strictly."},
{domain:"Technological", name:"8.3 Information access restriction", guide:"Restrict access to information on a need-to-know basis."},
{domain:"Technological", name:"8.4 Access to source code", guide:"Restrict access to source code and development environments."},
{domain:"Technological", name:"8.5 Secure authentication", guide:"Implement strong multi-factor authentication wherever possible."},
{domain:"Technological", name:"8.6 Capacity management", guide:"Monitor and manage capacity to avoid performance or security degradation."},
{domain:"Technological", name:"8.7 Protection against malware", guide:"Deploy and maintain anti-malware controls on all systems."},
{domain:"Technological", name:"8.8 Management of technical vulnerabilities", guide:"Identify, assess and remediate technical vulnerabilities promptly."},
{domain:"Technological", name:"8.9 Configuration management", guide:"Maintain secure baseline configurations for all systems."},
{domain:"Technological", name:"8.10 Information deletion", guide:"Securely delete information when no longer required."},
{domain:"Technological", name:"8.11 Data masking", guide:"Mask sensitive data in non-production environments."},
{domain:"Technological", name:"8.12 Data leakage prevention", guide:"Implement data loss prevention controls and monitoring."},
{domain:"Technological", name:"8.13 Information backup", guide:"Perform regular backups and test restoration procedures."},
{domain:"Technological", name:"8.14 Redundancy of information processing facilities", guide:"Provide redundant facilities to ensure availability."},
{domain:"Technological", name:"8.15 Logging", guide:"Generate and protect audit logs for all critical activities."},
{domain:"Technological", name:"8.16 Monitoring activities", guide:"Implement continuous security monitoring and alerting."},
{domain:"Technological", name:"8.17 Clock synchronization", guide:"Synchronise clocks across all systems for accurate logging."},
{domain:"Technological", name:"8.18 Use of privileged utility programs", guide:"Restrict and monitor use of privileged utility programs."},
{domain:"Technological", name:"8.19 Installation of software on operational systems", guide:"Control and approve all software installations."},
{domain:"Technological", name:"8.20 Network security", guide:"Secure network infrastructure and communications."},
{domain:"Technological", name:"8.21 Security of network services", guide:"Secure all network services and agreements."},
{domain:"Technological", name:"8.22 Segregation of networks", guide:"Segregate networks according to security requirements."},
{domain:"Technological", name:"8.23 Web filtering", guide:"Implement web filtering and content controls."},
{domain:"Technological", name:"8.24 Use of cryptography", guide:"Apply appropriate cryptographic controls to protect information."},
{domain:"Technological", name:"8.25 Secure development life cycle", guide:"Integrate security into the entire software development lifecycle."},
{domain:"Technological", name:"8.26 Application security requirements", guide:"Define security requirements for all applications."},
{domain:"Technological", name:"8.27 Secure system architecture and engineering principles", guide:"Apply secure architecture and engineering principles."},
{domain:"Technological", name:"8.28 Secure coding", guide:"Enforce secure coding practices and code reviews."},
{domain:"Technological", name:"8.29 Security testing in development and acceptance", guide:"Perform security testing at every stage of development."},
{domain:"Technological", name:"8.30 Outsourced development", guide:"Apply the same security controls to outsourced development."},
{domain:"Technological", name:"8.31 Separation of development, test and production environments", guide:"Strictly separate development, test and production environments."},
{domain:"Technological", name:"8.32 Change management", guide:"Implement formal change management with security review."},
{domain:"Technological", name:"8.33 Test information", guide:"Protect test data and use realistic but anonymised data."},
{domain:"Technological", name:"8.34 Protection of information systems during audit testing", guide:"Protect live systems during audit and penetration testing."}
];

let table = document.getElementById("table");

controls.forEach((c, i) => {
    let row = table.insertRow();
    row.innerHTML = `
        <td>${i+1}</td>
        <td class="domain">${c.domain}</td>
        <td>${c.name}</td>
        <td>
            <select onchange="updateGuide(this,'g${i}')">
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="Partial">Partial</option>
            </select>
        </td>
        <td class="remediation" id="g${i}"></td>
        <td><textarea></textarea></td>
    `;
});

function updateGuide(select, id) {
    let guide = document.getElementById(id);
    if (select.value === "No") {
        guide.innerText = controls[id.replace("g","")].guide;
    } else {
        guide.innerText = "";
    }
}

function exportCSV() {
    let rows = document.querySelectorAll("table tr");
    let csv = [];
    rows.forEach(row => {
        let cols = row.querySelectorAll("td,th");
        let data = [];
        cols.forEach(col => {
            let select = col.querySelector("select");
            let textarea = col.querySelector("textarea");
            if (select) data.push(select.value);
            else if (textarea) data.push(textarea.value.replace(/,/g, ";"));
            else data.push(col.innerText.replace(/,/g, ";"));
        });
        csv.push(data.join(","));
    });
    let blob = new Blob([csv.join("\n")], {type: "text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "ISO27001_Audit_Report.csv";
    a.click();
}
</script>
</body>
</html>
</DOCUMENT>
